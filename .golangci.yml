run:
  timeout: 5m
  go: '1.22'

linters:
  enable:
    - errcheck       
    - gosimple       
    - govet          
    - ineffassign    
    - staticcheck    
    - unused         
    - gofmt          
    - goimports      
    - revive         
    - gocritic       
    - misspell       
    - bodyclose      
    - noctx          
    - copyloopvar
    - godot          
    - gocyclo        
    - dupl           

linters-settings:
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0